<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2310a37f'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white' font-weight='bold'%3EDS%3C/text%3E%3C/svg%3E">
    <title>DeepSeek 创作助手 · 同人专用</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #ffffff;
            --surface: #f9fafb;
            --border: #e5e7eb;
            --text: #111827;
            --text-secondary: #6b7280;
            --bubble-user: #10a37f;
            --bubble-user-text: white;
            --bubble-ai: #e5e7eb;
            --bubble-ai-text: #111827;
            --input-bg: white;
            --shadow: 0 1px 3px rgba(0,0,0,0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212;
                --surface: #1e1e1e;
                --border: #2c2c2e;
                --text: #ededee;
                --text-secondary: #8e8e93;
                --bubble-user: #10a37f;
                --bubble-user-text: white;
                --bubble-ai: #2c2c2e;
                --bubble-ai-text: #ededee;
                --input-bg: #1c1c1e;
                --shadow: 0 1px 3px rgba(0,0,0,0.3);
            }
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部栏 */
        .header {
            padding: 12px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            backdrop-filter: blur(10px);
        }
        .title {
            font-weight: 600;
            font-size: 1.2rem;
        }
        .settings-btn {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: var(--text);
        }

        /* 消息区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }
        .message {
            display: flex;
            max-width: 85%;
        }
        .message.user {
            align-self: flex-end;
            justify-content: flex-end;
        }
        .message.ai {
            align-self: flex-start;
        }
        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.4;
            font-size: 0.95rem;
        }
        .user .bubble {
            background: var(--bubble-user);
            color: var(--bubble-user-text);
            border-bottom-right-radius: 4px;
        }
        .ai .bubble {
            background: var(--bubble-ai);
            color: var(--bubble-ai-text);
            border-bottom-left-radius: 4px;
        }
        .loading {
            font-style: italic;
            color: var(--text-secondary);
        }

        /* 底部输入栏 */
        .input-area {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 10px 12px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }
        textarea {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 10px 14px;
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            color: var(--text);
            max-height: 120px;
        }
        button {
            background: #10a37f;
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { opacity: 0.7; }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 设置面板 (折叠) */
        .settings-panel {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: none;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0;
        }
        .settings-panel.show {
            display: flex;
        }
        .setting-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .setting-row label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        input, select, textarea {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px 12px;
            color: var(--text);
            font-size: 0.9rem;
        }
        .model-buttons {
            display: flex;
            gap: 10px;
        }
        .model-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .model-btn.active {
            background: #10a37f;
            border-color: #10a37f;
            color: white;
        }
        .small-btn {
            background: #6b7280;
            padding: 6px 12px;
            font-size: 0.75rem;
        }
        .danger-btn {
            background: #dc2626;
        }
        hr {
            border-color: var(--border);
            margin: 4px 0;
        }
    </style>
</head>
<body>

<div class="header">
    <span class="title">📖 同人创作助手 · DeepSeek</span>
    <button class="settings-btn" id="toggleSettingsBtn">⚙️</button>
</div>

<div id="settingsPanel" class="settings-panel">
    <div class="setting-row">
        <label>🔑 API Key (deepseek官方)</label>
        <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxx">
        <button id="saveKeyBtn" style="background:#3b82f6; margin-top:5px;">保存密钥</button>
    </div>
    <div class="setting-row">
        <label>📝 系统提示词 (System Prompt) — 留空则不发送</label>
        <textarea id="systemPromptInput" rows="2" placeholder="例如：你是一位擅长写ABO设定的同人作者..."></textarea>
    </div>
    <div class="setting-row">
        <label>🤖 模型选择</label>
        <div class="model-buttons">
            <button class="model-btn" data-model="deepseek-v4-flash">⚡ Flash (快速/便宜)</button>
            <button class="model-btn" data-model="deepseek-v4-pro">🏆 Pro (强大/长文)</button>
        </div>
    </div>
    <div class="setting-row">
        <button id="clearChatBtn" class="small-btn danger-btn">🗑️ 清空对话记录</button>
    </div>
    <div class="setting-row">
        <small style="color: var(--text-secondary);">✅ 对话自动保存 · 流式输出 · 明暗跟随系统</small>
    </div>
</div>

<div class="chat-container" id="chatContainer">
    <div class="message ai">
        <div class="bubble">你好！我是你的同人文助手。请先在上方设置你的 API Key，然后开始创作吧 ✍️</div>
    </div>
</div>

<div class="input-area">
    <textarea id="messageInput" rows="1" placeholder="写一段场景... 或描述你想让AI续写的内容"></textarea>
    <button id="sendBtn">发送</button>
</div>

<script>
    // ---------- DOM 元素 ----------
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveKeyBtn = document.getElementById('saveKeyBtn');
    const systemPromptInput = document.getElementById('systemPromptInput');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const toggleSettingsBtn = document.getElementById('toggleSettingsBtn');
    const settingsPanel = document.getElementById('settingsPanel');
    const modelBtns = document.querySelectorAll('.model-btn');

    // ---------- 全局变量 ----------
    let currentModel = 'deepseek-v4-flash';
    let currentApiKey = '';
    let currentSystemPrompt = '';
    let messages = [];
    let isLoading = false;
    let abortController = null;

    // ---------- 本地存储读取 ----------
    function loadStorage() {
        const savedApiKey = localStorage.getItem('ds_api_key');
        if (savedApiKey) {
            currentApiKey = savedApiKey;
            apiKeyInput.value = savedApiKey;
        }
        const savedSysPrompt = localStorage.getItem('ds_system_prompt');
        if (savedSysPrompt) {
            currentSystemPrompt = savedSysPrompt;
            systemPromptInput.value = savedSysPrompt;
        } else {
            // 用户要求：不预加载任何默认提示词，保持空白
            currentSystemPrompt = '';
            systemPromptInput.value = '';
        }
        const savedModel = localStorage.getItem('ds_model');
        if (savedModel && (savedModel === 'deepseek-v4-flash' || savedModel === 'deepseek-v4-pro')) {
            currentModel = savedModel;
        } else {
            currentModel = 'deepseek-v4-flash';
        }
        updateModelButtonUI();
        
        const savedMessages = localStorage.getItem('ds_messages');
        if (savedMessages) {
            try {
                messages = JSON.parse(savedMessages);
                if (!Array.isArray(messages)) messages = [];
            } catch(e) { messages = []; }
        }
        if (messages.length === 0) {
            messages = [
                { role: 'user', content: '你好，请自我介绍' },
                { role: 'assistant', content: '你好！我是你的同人文助手。请先在上方设置你的 API Key，然后开始创作吧 ✍️' }
            ];
        }
        renderMessages();
    }

    function saveApiKeyToStorage(key) {
        localStorage.setItem('ds_api_key', key);
        currentApiKey = key;
    }
    function saveSystemPromptToStorage(prompt) {
        localStorage.setItem('ds_system_prompt', prompt);
        currentSystemPrompt = prompt;
    }
    function saveModelToStorage(model) {
        localStorage.setItem('ds_model', model);
        currentModel = model;
    }
    function saveMessagesToStorage() {
        localStorage.setItem('ds_messages', JSON.stringify(messages));
    }

    function updateModelButtonUI() {
        modelBtns.forEach(btn => {
            const modelVal = btn.getAttribute('data-model');
            if (modelVal === currentModel) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    function renderMessages() {
        chatContainer.innerHTML = '';
        for (let msg of messages) {
            const div = document.createElement('div');
            div.className = `message ${msg.role === 'user' ? 'user' : 'ai'}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerText = msg.content;
            div.appendChild(bubble);
            chatContainer.appendChild(div);
        }
        scrollToBottom();
    }

    function scrollToBottom() {
        setTimeout(() => {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }, 50);
    }

    function addMessage(role, content, save = true) {
        messages.push({ role, content });
        if (save) saveMessagesToStorage();
        renderMessages();
    }

    async function sendWithStream(userMessage) {
        if (!currentApiKey) {
            alert('请先设置并保存 API Key');
            return;
        }
        if (isLoading) return;
        isLoading = true;
        sendBtn.disabled = true;
        
        addMessage('user', userMessage, true);
        messageInput.value = '';
        messageInput.style.height = 'auto';
        
        const tempAiMsg = { role: 'assistant', content: '' };
        messages.push(tempAiMsg);
        const msgIndex = messages.length - 1;
        renderMessages();
        const lastBubble = chatContainer.lastChild?.querySelector('.bubble');
        
        const requestMessages = [];
        if (currentSystemPrompt && currentSystemPrompt.trim()) {
            requestMessages.push({ role: 'system', content: currentSystemPrompt });
        }
        const historyMessages = messages.slice(0, -1);
        for (let m of historyMessages) {
            requestMessages.push({ role: m.role, content: m.content });
        }
        
        const apiUrl = 'https://api.deepseek.com/v1/chat/completions';
        abortController = new AbortController();
        
        let fullContent = '';
        try {
            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${currentApiKey}`
                },
                body: JSON.stringify({
                    model: currentModel,
                    messages: requestMessages,
                    stream: true,
                    temperature: 0.8,
                    max_tokens: 4096
                }),
                signal: abortController.signal
            });
            
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`API错误 ${response.status}: ${errText}`);
            }
            
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';
                
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (trimmed.startsWith('data: ')) {
                        const data = trimmed.slice(6);
                        if (data === '[DONE]') continue;
                        try {
                            const parsed = JSON.parse(data);
                            const delta = parsed.choices[0]?.delta?.content || '';
                            if (delta) {
                                fullContent += delta;
                                messages[msgIndex].content = fullContent;
                                if (lastBubble) lastBubble.innerText = fullContent;
                                scrollToBottom();
                            }
                        } catch(e) {}
                    }
                }
            }
            if (fullContent === '') {
                messages[msgIndex].content = '[无回复内容]';
                if (lastBubble) lastBubble.innerText = '[无回复内容]';
            }
            saveMessagesToStorage();
        } catch (error) {
            if (error.name === 'AbortError') {
                console.log('请求取消');
            } else {
                console.error(error);
                messages[msgIndex].content = `❌ 错误: ${error.message}`;
                if (lastBubble) lastBubble.innerText = `❌ 错误: ${error.message}`;
                saveMessagesToStorage();
            }
        } finally {
            isLoading = false;
            sendBtn.disabled = false;
            abortController = null;
        }
    }
    
    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        if (!currentApiKey) {
            alert('请先点击⚙️，粘贴你的DeepSeek API Key并点击保存');
            return;
        }
        sendWithStream(text);
    }
    
    function clearChat() {
        if (isLoading) {
            if (abortController) abortController.abort();
        }
        messages = [
            { role: 'assistant', content: '对话已清空。我们来写一段新同人吧 ✨' }
        ];
        saveMessagesToStorage();
        renderMessages();
    }
    
    function saveApiKey() {
        const newKey = apiKeyInput.value.trim();
        if (newKey) {
            saveApiKeyToStorage(newKey);
            alert('API Key 已保存（仅存在本机）');
        } else {
            alert('请输入有效的 Key');
        }
    }
    
    function bindSystemPromptSave() {
        systemPromptInput.addEventListener('change', () => {
            saveSystemPromptToStorage(systemPromptInput.value);
        });
    }
    
    function initModelSwitch() {
        modelBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const model = btn.getAttribute('data-model');
                currentModel = model;
                saveModelToStorage(model);
                updateModelButtonUI();
            });
        });
    }
    
    function autoResizeTextarea() {
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(120, messageInput.scrollHeight) + 'px';
    }
    
    function handleKeyboard() {
        messageInput.addEventListener('focus', () => {
            setTimeout(() => scrollToBottom(), 300);
        });
    }
    
    function bindEvents() {
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        messageInput.addEventListener('input', autoResizeTextarea);
        saveKeyBtn.addEventListener('click', saveApiKey);
        clearChatBtn.addEventListener('click', clearChat);
        toggleSettingsBtn.addEventListener('click', () => {
            settingsPanel.classList.toggle('show');
        });
        bindSystemPromptSave();
        initModelSwitch();
        handleKeyboard();
    }
    
    loadStorage();
    bindEvents();
    if (!currentApiKey) {
        setTimeout(() => {
            settingsPanel.classList.add('show');
        }, 300);
    }
</script>
</body>
</html>
